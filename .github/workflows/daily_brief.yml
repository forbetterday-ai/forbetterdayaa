name: Daily News Brief 자동화
# ===== 스케줄 설명 =====
# 그룹1 (Premium: FT/Bloomberg/Reuters/WSJ): KST 7~23시 매시간
# 그룹2 (Daily: TechCrunch/Space/Defense/Tech): KST 7시, 21시만
on:
  schedule:
    # KST 7시, 21시 → 전체 피드 (Premium + Daily)
    - cron: '0 22,12 * * *'
    # KST 8~20시, 22~23시 → Premium만 (FT/Bloomberg/Reuters/WSJ)
    - cron: '0 0-11,13-14,23 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  daily-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Determine run mode
        id: mode
        run: |
          # KST 7시/21시 → 전체
          if [ "${{ github.event.schedule }}" = "0 22,12 * * *" ]; then
            echo "feed_group=all" >> $GITHUB_OUTPUT
          # 수동 실행 → 전체
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "feed_group=all" >> $GITHUB_OUTPUT
          # 그 외 → Premium만
          else
            echo "feed_group=premium" >> $GITHUB_OUTPUT
          fi
      - name: Run daily brief
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          LOG_LEVEL: INFO
          FEED_GROUP: ${{ steps.mode.outputs.feed_group }}
        run: |
          echo "FEED_GROUP: $FEED_GROUP"
          python main.py --mode daily
      - name: Deploy briefing page
        run: |
          git config user.name "FT Automation"
          git config user.email "forbetterday@gmail.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update briefing - $(date +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: output/
          retention-days: 7
      - name: Notify on failure
        if: failure()
        run: echo "✗ 데일리 브리핑 실행 실패. 로그를 확인하세요."
